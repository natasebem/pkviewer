<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>My Map</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.30/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>

  <script>
    require(["esri/WebMap", "esri/views/MapView"], (WebMap, MapView) => {

      const webmap = new WebMap({
        portalItem: {
          id: "a0d903e19b594381a42242960f6af1f6"
        }
      });

      const view = new MapView({
        container: "viewDiv",
        map: webmap
      });

    });
  </script>
</head>

<body>
  <div id="viewDiv"></div>
</body>
</html>
