<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GJ Pokemap</title>

  <!-- ArcGIS Maps SDK for JavaScript (4.x CDN) -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.30/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>

  <script>
    require([
      "esri/WebMap",
      "esri/views/MapView",
      "esri/widgets/LayerList",
      "esri/widgets/Legend",
      "esri/widgets/BasemapGallery",
      "esri/widgets/Expand",
      "esri/widgets/Locate"
    ], function (WebMap, MapView, LayerList, Legend, BasemapGallery, Expand, Locate) {

      const webmap = new WebMap({
        portalItem: { id: "a0d903e19b594381a42242960f6af1f6" }   // <-- change this
      });

      const view = new MapView({
        container: "viewDiv",
        map: webmap
      });

      view.when(() => {
        // Layer toggle panel
        const layerList = new LayerList({ view });

        // Legend
        const legend = new Legend({ view });

        // Basemap switcher
        const basemapGallery = new BasemapGallery({ view });

        // GPS "My Location" button
        const locate = new Locate({
          view,
          useHeadingEnabled: true,
          goToOverride: (view, options) => {
            options.target.scale = 2500; // zoom level when locating (adjust if you want)
            return view.goTo(options.target);
          }
        });

        // Put each one in an Expand so it doesn't clutter the map
        const layerExpand = new Expand({
          view,
          content: layerList,
          expanded: false,
          mode: "floating",
          expandTooltip: "Layers"
        });

        const legendExpand = new Expand({
          view,
          content: legend,
          expanded: false,
          mode: "floating",
          expandTooltip: "Legend"
        });

        const basemapExpand = new Expand({
          view,
          content: basemapGallery,
          expanded: false,
          mode: "floating",
          expandTooltip: "Basemap"
        });

        // Add to UI
        view.ui.add(locate, "top-left");
        view.ui.add(layerExpand, "top-right");
        view.ui.add(legendExpand, "top-right");
        view.ui.add(basemapExpand, "top-right");
      });

    });
  </script>
</head>

<body>
  <div id="viewDiv"></div>
</body>
</html>
